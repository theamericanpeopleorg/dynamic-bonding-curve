[toolchain]
anchor_version = "0.32.1"
solana_version = "2.3.13"

[features]
resolution = true
skip-lint = false

[programs.localnet]
dynamic_bonding_curve = "BGYDrwDnJVuYkHewahreyiddfMXErUDzp3RvVEDPmYBz"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
ixdata = "yarn run tsx --tsconfig ./tsconfig.json ./scripts/generate_ix_data_for_tests.ts"
test = "NODE_OPTIONS=--no-experimental-strip-types yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
